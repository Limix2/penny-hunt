# Alembic config. NOTE: this project's default run uses Base.metadata.create_all
# (auto-schema) + locator seeding, which already adds store_cookie and populates
# Walmart cookies. This migration is provided for teams deploying on Postgres with
# Alembic. Run from backend/: `alembic upgrade head` (against a DB NOT already
# created by create_all, or the column add will conflict).
[alembic]
script_location = migrations
sqlalchemy.url = sqlite:///./penny_hunt.db
